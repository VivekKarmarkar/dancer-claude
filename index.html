<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dancer Claude</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>Dancer Claude</h1>
      <div class="theme-toggle">
        <button class="theme-btn active" data-theme="minimal">Minimal</button>
        <button class="theme-btn" data-theme="stylized">Stylized</button>
        <button class="theme-btn" data-theme="wild">Wild</button>
      </div>
    </header>

    <canvas id="dance-floor" width="800" height="500"></canvas>

    <section class="playback">
      <p class="now-playing">No song loaded</p>
      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>
      <span class="time-display">0:00 / 0:00</span>
    </section>

    <section class="song-selection">
      <div class="mode-toggle">
        <button class="mode-btn active" data-mode="freestyle">Freestyle</button>
        <button class="mode-btn" data-mode="choreo">Choreographed</button>
      </div>

      <div id="freestyle-panel">
        <label class="upload-label">
          Upload Song
          <input type="file" accept="audio/*" id="file-upload" hidden>
        </label>
        <div id="learned-mix-container" style="display:none;">
          <label class="mix-label">
            Freestyle
            <input type="range" id="learned-mix-slider" min="0" max="100" value="0">
            Learned
          </label>
        </div>
      </div>

      <div id="choreo-panel" style="display:none;">
        <select id="song-select">
          <option value="" disabled selected>Pick a song...</option>
          <option value="choreo_e945aeb3">YMCA — Village People</option>
          <option value="choreo_b08abf2e">Low — T-Pain ft. Flo Rida</option>
          <option value="choreo_f45b6e13">Paint the Town Red — Doja Cat</option>
          <option value="choreo_3d290c67">Levels — Avicii</option>
          <option value="choreo_abb179c0">Toxic — Britney Spears</option>
          <option value="choreo_8cb1bb1d">Whistle — Flo Rida</option>
          <option value="choreo_ed69a1bd">Swalla — Jason Derulo</option>
          <option value="choreo_316e73fb">Gangnam Style — PSY</option>
          <option value="choreo_1c8fc6ab">Macarena — Los del Rio</option>
          <option value="choreo_8c8baa09">No Lie — Dua Lipa</option>
        </select>
      </div>
    </section>

    <section class="controls">
      <button id="play-btn" disabled>Play</button>
      <button id="record-btn" disabled>Record</button>
      <button id="record-full-btn" disabled>Record Full Song</button>
    </section>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
